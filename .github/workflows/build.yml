name: Build Kernel
on: 
  workflow_dispatch:
    inputs:
      LineageOS_Version:
        description: LineageOS Version
        required: true
        type: string
jobs:
  build: 
    runs-on: ubuntu-22.04
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "JackyLu0520"
          git config --global user.name "JackyLu0520"
      
      - name: Install dependencies
        run: |
          sudo apt remove firefox google-chrome-stable
          sudo apt update && sudo apt upgrade -y
          sudo apt-get install -y git ccache make flex bison bc cpio \
          python3 python3-dev python-is-python3 \
          build-essential curl libssl-dev libelf-dev libdw-dev \
          zip unzip device-tree-compiler libncurses5 \
          gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi
      
      - name: Setup Clang
        run: |
          mkdir -p clang
          cd clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz | tar -xz
          cd ..
      
      - name: Checkout defconfig
        uses: actions/checkout@v7
        with:
          path: defconfig
          fetch-depth: 0

      - name: Checkout kernel source
        uses: actions/checkout@v7
        with:
          repository: LineageOS/android_kernel_oneplus_sm8750
          path: kernel
          fetch-depth: 0
          ref: lineage-${{github.event.inputs.LineageOS_Version}}
      
      - name: Checkout sm8750-modules
        uses: actions/checkout@v7
        with:
          repository: LineageOS/android_kernel_oneplus_sm8750-modules
          path: sm8750-modules
          fetch-depth: 0
          ref: lineage-${{github.event.inputs.LineageOS_Version}}
      
      - name: Checkout sm8750-devicetrees
        uses: actions/checkout@v7
        with:
          repository: LineageOS/android_kernel_oneplus_sm8750-devicetrees
          path: sm8750-devicetrees
          fetch-depth: 0
          ref: lineage-${{github.event.inputs.LineageOS_Version}}

      - name: Setup envs
        run: |
          export PATH=$PWD/clang/bin:$PATH

      - name: Init
        run: |
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          ccache -M 4G

          cd kernel
          make mrproper
          cp ../defconfig/erhai_defconfig arch/arm64/configs
          make ARCH=arm64 erhai_defconfig
      
      - name: Build Kernel
        run: |
          make \
            ARCH=arm64 \
            PATH=$PWD/../clang/bin:$PATH \
            LD_LIBRARY_PATH=$PWD/../clang/lib \
            LLVM=1 \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            -j4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image

