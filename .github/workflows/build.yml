name: Build Kernel
on: 
  workflow_dispatch:
    inputs:
      LineageOS_Version:
        description: LineageOS Version
        required: true
        type: string
jobs:
  build: 
    runs-on: ubuntu-22.04
    steps:
      - name: Configure Git
        run: |
          git config --global user.name "JackyLu0520"
          git config --global user.name "JackyLu0520"
      
      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y python3 git curl
      
      - name: Setup Clang
        run: |
          mkdir -p clang
          cd clang
          curl -L https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r522817.tar.gz | tar -xz
          cd ..
      
      - name: Checkout defconfig
        uses: actions/checkout@v7
        with:
          path: defconfig
          fetch-depth: 0

      - name: Checkout kernel source
        uses: actions/checkout@v7
        with:
          repository: LineageOS/android_kernel_oneplus_sm8750
          path: kernel
          fetch-depth: 0
          ref: lineage-${{github.event.inputs.LineageOS_Version}}
      
      - name: Init
        run: |
          cd kernel
          make mrproper
          mkdir -p out
          cp ../defconfig/erhai_defconfig arch/arm64/configs
          make O=out ARCH=arm64 erhai_defconfig
      
      - name: Build Kernel
        run: |
          export PATH=$PWD/../clang/bin:PATH
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LLVM=1
          export CLANG_TRIPLE=aarch64-linux-gnu-
          make -j$(nproc) Image
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Image
          path: arch/arm64/boot/Image

